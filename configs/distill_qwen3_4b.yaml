# Lightweight config: Distill GLM-5.1 -> Qwen3-4B
# Ultra-fast inference, runs on any computer
# Q4 quantized: ~2.5GB RAM, great for edge/mobile deployment

student_model: Qwen/Qwen3-4B
data_file: data/teacher_outputs/train.jsonl
output_dir: outputs/qwen3-4b-glm5-distill

# Training
num_epochs: 3
batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 2e-4
max_seq_length: 2048
warmup_ratio: 0.05
weight_decay: 0.01
bf16: true

# LoRA
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Logging & saving
logging_steps: 10
save_steps: 200
eval_ratio: 0.05
