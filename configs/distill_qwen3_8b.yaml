# Tacit Knowledge Distillation: GLM-5.1 -> Qwen3-8B
# 3-phase progressive training (Polanyi)

student_model: Qwen/Qwen3-8B
data_dir: data/teacher_outputs
output_dir: outputs/qwen3-8b-glm5-distill

# Training
num_epochs: 3
batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 1e-4
max_seq_length: 2048
bf16: true

# Phase LR multipliers
phase1_lr_mult: 1.0    # Explicit (CoT)
phase2_lr_mult: 0.5    # Internalization
phase3_lr_mult: 0.25   # Calibration

# LoRA
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

logging_steps: 10
save_steps: 200
