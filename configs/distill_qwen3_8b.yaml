# Default config: Distill GLM-5.1 -> Qwen3-8B
# Best balance of quality and inference speed on consumer hardware
# Q4 quantized: ~5GB RAM for inference, runs on 8GB+ PCs

student_model: Qwen/Qwen3-8B
data_file: data/teacher_outputs/train.jsonl
output_dir: outputs/qwen3-8b-glm5-distill

# Training
num_epochs: 3
batch_size: 2
gradient_accumulation_steps: 16
learning_rate: 1e-4
max_seq_length: 2048
warmup_ratio: 0.05
weight_decay: 0.01
bf16: true

# LoRA
lora_r: 64
lora_alpha: 128
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Logging & saving
logging_steps: 10
save_steps: 200
eval_ratio: 0.05
